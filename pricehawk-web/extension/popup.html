<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 320px;
      font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0f11; /* Dark theme background */
      color: #f3f4f6; /* Text primary */
    }

    /* Background Pattern (subtle grid like the website) */
    .grid-bg {
      position: absolute;
      inset: 0;
      background-size: 32px 32px;
      background-image: linear-gradient(to right, rgba(23, 26, 29, 0.4) 1px, transparent 1px),
                        linear-gradient(to bottom, rgba(23, 26, 29, 0.4) 1px, transparent 1px);
      z-index: 0;
      pointer-events: none;
    }

    /* Ambient glow */
    .glow {
      position: absolute;
      top: -30px;
      right: -30px;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(0, 229, 155, 0.15) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
    }

    .header {
      background: rgba(23, 26, 29, 0.6);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #262b31;
      padding: 16px;
      text-align: center;
      cursor: pointer;
    }

    .header-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .header-icon {
      width: 24px;
      height: 24px;
      border-radius: 6px;
      background: linear-gradient(135deg, #00e59b 0%, #00b377 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 800;
      color: #0d0f11;
      font-family: 'Outfit', sans-serif;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 400;
      font-family: 'DM Serif Display', serif;
      color: #f3f4f6;
      letter-spacing: 0.02em;
    }
    .header p {
      font-size: 12px;
      color: #9ba3af;
      margin-top: 4px;
      font-weight: 300;
    }
    .content {
      padding: 16px;
    }

    /* Cards */
    .product-info {
      background: #171a1d;
      border: 1px solid #262b31;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 14px;
      display: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .product-info.detected {
      display: block;
      animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .product-name {
      font-size: 14px;
      font-weight: 500;
      color: #f3f4f6;
      margin-bottom: 6px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-price {
      font-size: 22px;
      font-weight: 700;
      color: #00e59b;
      font-family: 'Outfit', sans-serif;
    }
    .product-store {
      display: inline-block;
      font-size: 11px;
      color: #9ba3af;
      margin-top: 6px;
      background: #0d0f11;
      padding: 2px 8px;
      border-radius: 100px;
      border: 1px solid #262b31;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .product-image {
      width: 56px;
      height: 56px;
      object-fit: contain;
      float: right;
      margin-left: 12px;
      border-radius: 8px;
      background: #ffffff; /* White background for product images to look clean */
      border: 1px solid #262b31;
      padding: 4px;
    }
    .product-image.hidden {
      display: none;
    }

    /* Messages */
    .error-message {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #ef4444;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    .error-message.show {
      display: block;
    }
    .no-product {
      text-align: center;
      padding: 24px 16px;
      color: #9ba3af;
      font-size: 13px;
      display: none;
      font-weight: 300;
      background: #171a1d;
      border: 1px dashed #262b31;
      border-radius: 12px;
    }
    .no-product.show {
      display: block;
    }
    .loading {
      text-align: center;
      padding: 20px;
      color: #00e59b;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .loading.hidden {
      display: none;
    }

    /* Button */
    .button {
      width: 100%;
      padding: 12px;
      background: #00e59b;
      color: #0d0f11;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 16px;
      box-shadow: 0 0 15px rgba(0, 229, 155, 0.2);
    }
    .button:hover:not(:disabled) {
      background: #00c988;
      box-shadow: 0 0 20px rgba(0, 229, 155, 0.4);
    }
    .button:disabled {
      background: #262b31;
      color: #6b7280;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Success state */
    .success-message {
      background: rgba(0, 229, 155, 0.1);
      border: 1px solid rgba(0, 229, 155, 0.3);
      color: #00e59b;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      text-align: center;
      display: none;
      font-weight: 500;
    }
    .success-message.show {
      display: block;
    }

    /* Input */
    .price-input {
      width: 100%;
      padding: 10px 12px;
      background: #0d0f11;
      border: 1px solid #262b31;
      color: #f3f4f6;
      border-radius: 8px;
      font-size: 14px;
      margin-top: 8px;
      transition: border-color 0.2s;
    }
    .price-input:focus {
      outline: none;
      border-color: #00e59b;
      box-shadow: 0 0 0 1px #00e59b;
    }
    .manual-price {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #262b31;
      display: none;
    }
    .manual-price.show {
      display: block;
    }
    .manual-price label {
      font-size: 12px;
      color: #9ba3af;
      font-weight: 500;
    }

    /* Footer */
    .footer {
      padding: 14px 16px;
      text-align: center;
      font-size: 12px;
      color: #9ba3af;
      border-top: 1px solid #262b31;
      background: #171a1d;
    }
    .footer a {
      color: #00e59b;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .footer a:hover {
      color: #00c988;
    }
    .clear {
      clear: both;
    }
  </style>
</head>
<body>
  <div class="grid-bg"></div>
  <div class="glow"></div>

  <div class="container">
    <div class="header" id="headerButton" title="Reload extension">
      <div class="header-logo">
        <div class="header-icon">P</div>
        <h1>PriceHawk</h1>
      </div>
      <p>Never overpay for anything</p>
    </div>

    <div class="content">
      <div class="loading" id="loading">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite; transform-origin: center;">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M12 2a10 10 0 0 1 10 10"></path>
          <style>@keyframes spin { 100% { transform: rotate(360deg); } }</style>
        </svg>
        Detecting product...
      </div>

      <div class="product-info" id="productInfo">
        <img class="product-image hidden" id="productImage">
        <div class="product-name" id="productName"></div>
        <div class="product-price" id="productPrice"></div>
        <div class="product-store" id="productStore"></div>
        <div class="clear"></div>

        <div class="manual-price" id="manualPriceSection">
          <label>Could not parse price. Enter it manually:</label>
          <input type="number" step="0.01" class="price-input" id="manualPriceInput" placeholder="0.00">
        </div>

        <div class="manual-price show" id="existingProductSection" style="margin-top: 10px; padding-top: 10px;">
          <label>Add to existing product? (Optional)</label>
          <select class="price-input" id="existingProductSelect">
            <option value="">-- Create new product --</option>
          </select>
        </div>

        <button class="button" id="trackButton" disabled>Track This Product</button>
      </div>

      <div class="no-product" id="noProduct">
        <div style="font-size: 24px; margin-bottom: 8px;">🛒</div>
        <p>No product detected here.</p>
        <p style="margin-top: 8px; font-size: 12px; color: #6b7280;">Browse to a product page on a supported store (like Best Buy, Target, Amazon) to track it.</p>
      </div>

      <div class="error-message" id="errorMessage"></div>

      <div class="success-message" id="successMessage">
        <div style="font-size: 20px; margin-bottom: 8px;">✨</div>
        Product added!<br>
        <span style="font-size: 12px; font-weight: 400; color: #9ba3af; margin-top: 4px; display: inline-block;">We'll notify you when the price drops.</span>
      </div>
    </div>

    <div class="footer">
      <a href="http://localhost:3000/dashboard" target="_blank">Open Dashboard →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
